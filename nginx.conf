worker_processes 8;
error_log /var/nginx/log/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    client_max_body_size 256M;
    log_format main '$remote_addr - $remote_user [$time_local] "$request"'
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout  65;
    server {
      listen 8080;

      location / {
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_set_header X-NginX-Proxy true;

        proxy_pass http://127.0.0.1:8081/;
        proxy_redirect off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
      }

      location ^~ /static {
        proxy_pass http://127.0.0.1:8081/static/;
      }
      location ^~ /vendor {
        proxy_pass http://127.0.0.1:8081/vendor;
      }
      location = /_stcore/health {
        proxy_pass http://127.0.0.1:8081/_stcore/health;
      }
      location = /_stcore/allowed-message-origins {
        proxy_pass http://127.0.0.1:8081/_stcore/allowed-message-origins;
      }
      add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline';" always;

      location ~* ^/api/(.*) {
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_set_header X-NginX-Proxy true;

        proxy_pass http://127.0.0.1:8502/$1$is_args$args;
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
      }
      location /api/openapi.json {
        proxy_pass http://127.0.0.1:8502/openapi.json;
      }
   }
}
